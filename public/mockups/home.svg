  <rect x="330" y="18" width="38" height="14" rx="3" fill="none" stroke="#E0F2F1" stroke-width="1.5" opacity="0.6"/>
  <rect x="332" y="20" width="28" height="10" rx="2" fill="#4DB6AC"/>
  <rect x="370" y="22" width="3" height="6" rx="1.5" fill="#E0F2F1" opacity="0.6"/>

