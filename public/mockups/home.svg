  <!-- Account card 3 (partial) -->
  <rect x="292" y="232" width="130" height="74" rx="16" fill="#1A3330"/>
  <text x="306" y="255" fill="#E0F2F1" font-size="11" opacity="0.85">🏦 BBVA</text>
  <text x="306" y="277" fill="#E0F2F1" font-size="16" font-weight="700">$98.000</text>
  <text x="306" y="294" fill="#90A4AE" font-size="10">ARS</text>

