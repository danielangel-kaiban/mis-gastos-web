  <text x="310" y="568" fill="#EF5350" font-size="14" font-weight="600">−$9.800</text>

  <!-- Row 4 -->
  <rect x="16" y="598" width="358" height="58" rx="14" fill="#162A28"/>
  <rect x="30" y="611" width="32" height="32" rx="10" fill="#00897B" opacity="0.3"/>
  <text x="38" y="632" font-size="16">🍕</text>
