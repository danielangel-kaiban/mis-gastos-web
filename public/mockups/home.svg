  <!-- nav icons -->
  <text x="34" y="822" fill="#4DB6AC" font-size="20">🏠</text>
  <text x="108" y="822" fill="#546E7A" font-size="20">💸</text>
  <text x="182" y="822" fill="#546E7A" font-size="20">📊</text>
  <text x="258" y="822" fill="#546E7A" font-size="20">🏦</text>
  <text x="328" y="822" fill="#546E7A" font-size="20">⚙️</text>

  <!-- active tab indicator -->
  <rect x="36" y="784" width="30" height="3" rx="2" fill="#4DB6AC"/>
